<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หมวดหมู่ — btmusicdrive</title>
    <meta name="description" content="หมวดหมู่สินค้า btmusicdrive รวมแฟลชไดร์ฟเพลง MP3 ทุกแนว">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#8B7355',
                        secondary: '#0F172A',
                    }
                }
            }
        };
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script async defer crossorigin="anonymous" src="https://connect.facebook.net/th_TH/sdk.js"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', 'Inter', sans-serif; }
        .cat-banner {
            position: relative;
            min-height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .cat-banner img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease;
        }
        .cat-banner:hover img { transform: scale(1.03); }
        .cat-banner-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.55) 100%);
        }
        .cat-banner-content {
            position: relative;
            z-index: 10;
            text-align: center;
            color: #fff;
            padding: 2rem 1rem;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fadeInUp 0.5s ease forwards; opacity: 0; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased overflow-x-hidden">

    <!-- Shared Navbar -->
    <header id="site-header"></header>

    <!-- Category Banner -->
    <section class="pt-16">
        <div class="bg-white border-b border-gray-100">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 text-center">
                <h1 class="text-3xl md:text-4xl font-extrabold text-gray-900 mb-2">หมวดหมู่ทั้งหมด</h1>
                <p class="text-gray-500 text-base md:text-lg mb-3 max-w-2xl mx-auto">รวมสินค้าแฟลชไดร์ฟเพลง MP3 ทุกหมวดหมู่ ทุกแนวเพลง</p>
                <div class="flex items-center justify-center gap-2 text-sm text-gray-400">
                    <a href="index.html" class="hover:text-primary transition-colors">หน้าแรก</a>
                    <i class="ph ph-caret-right text-xs"></i>
                    <span class="text-gray-700 font-medium">หมวดหมู่</span>
                </div>
            </div>
        </div>
    </section>

    <!-- Quick Nav Chips -->
    <section class="bg-white border-b border-gray-100 sticky top-16 z-30">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3">
            <div class="flex items-center gap-3 overflow-x-auto scrollbar-hide" id="cat-chips">
                <!-- Populated by JS -->
            </div>
        </div>
    </section>

    <!-- All Categories Sections -->
    <div id="all-categories-container">
        <div class="text-center py-16">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-primary mx-auto"></div>
            <p class="mt-4 text-gray-500">กำลังโหลดหมวดหมู่...</p>
        </div>
    </div>

    <!-- Shared Footer -->
    <div id="site-footer"></div>

    <script src="components.js"></script>
    <script>
    // ── All Categories Page Logic ──────────────────────────────────
    const LS_CATEGORIES_KEY = 'btmusicdrive_categories';
    let allProducts = [];
    let allCats = [];
    let catProductsMap = new Map();

    const DEFAULT_BANNERS = {
        'เพื่อชีวิต': 'https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?ixlib=rb-4.0.3&auto=format&fit=crop&w=1400&q=80',
        'เพลงสตริง': 'https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?ixlib=rb-4.0.3&auto=format&fit=crop&w=1400&q=80',
        'ลูกทุ่ง': 'https://images.unsplash.com/photo-1470225620780-dba8ba36b745?ixlib=rb-4.0.3&auto=format&fit=crop&w=1400&q=80',
        'หมอลำ': 'https://images.unsplash.com/photo-1514320291840-2e0a9bf2a9ae?ixlib=rb-4.0.3&auto=format&fit=crop&w=1400&q=80',
        'เพลงสากล': 'https://images.unsplash.com/photo-1459749411175-04bf5292ceea?ixlib=rb-4.0.3&auto=format&fit=crop&w=1400&q=80',
        'ลูกกรุง': 'https://images.unsplash.com/photo-1507838153414-b4b713384a76?ixlib=rb-4.0.3&auto=format&fit=crop&w=1400&q=80',
        'เพลงสตริง 80': 'https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?ixlib=rb-4.0.3&auto=format&fit=crop&w=1400&q=80',
    };
    const DEFAULT_BANNER = 'https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?ixlib=rb-4.0.3&auto=format&fit=crop&w=1400&q=80';

    function getCategoriesFromStorage() {
        try { return JSON.parse(localStorage.getItem(LS_CATEGORIES_KEY)) || []; }
        catch { return []; }
    }

    document.addEventListener('DOMContentLoaded', async () => {
        await loadAllCategories();
    });

    async function loadAllCategories() {
        try {
            let response;
            try {
                response = await fetch(`${API_BASE}/products`);
                if (!response.ok) throw new Error();
            } catch {
                response = await fetch('products.json');
            }
            const json = await response.json();
            allProducts = Array.isArray(json) ? json : (json.data || []);
        } catch {
            allProducts = [];
        }

        // Group products by category
        catProductsMap = new Map();
        allProducts.forEach(p => {
            const catName = p.category?.name || p.category || 'อื่นๆ';
            if (!catProductsMap.has(catName)) catProductsMap.set(catName, []);
            catProductsMap.get(catName).push(p);
        });
        allCats = Array.from(catProductsMap.keys());

        renderNavChips();
        renderAllCategorySections();
        setupEvents();
    }

    function renderNavChips() {
        const container = document.getElementById('cat-chips');
        const savedCats = getCategoriesFromStorage();
        let html = `<a href="shop.html" class="flex-shrink-0 px-4 py-2 rounded-full border border-gray-200 text-sm font-medium text-gray-600 hover:border-primary hover:text-primary transition-all">สินค้าทั้งหมด</a>`;
        allCats.forEach(cat => {
            const savedCat = savedCats.find(c => c.name === cat);
            const icon = savedCat?.icon || '';
            html += `<a href="#cat-${encodeURIComponent(cat)}" class="flex-shrink-0 px-4 py-2 rounded-full border border-gray-200 text-sm font-medium text-gray-600 hover:border-primary hover:text-primary transition-all">
                ${icon ? `<i class="${icon} mr-1"></i>` : ''}${cat}
            </a>`;
        });
        container.innerHTML = html;
    }

    function renderAllCategorySections() {
        const container = document.getElementById('all-categories-container');
        const savedCats = getCategoriesFromStorage();

        let html = '';
        allCats.forEach(catName => {
            const products = catProductsMap.get(catName) || [];
            const savedCat = savedCats.find(c => c.name === catName);
            const bannerUrl = (savedCat && savedCat.bannerUrl) || DEFAULT_BANNERS[catName] || DEFAULT_BANNER;
            const description = (savedCat && savedCat.description) || `รวมสินค้าคุณภาพในหมวด ${catName}`;

            // Banner for this category
            html += `
            <section id="cat-${encodeURIComponent(catName)}" class="scroll-mt-28">
                <div class="relative h-48 md:h-64 overflow-hidden">
                    <img src="${bannerUrl}" alt="${catName}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-black/20 to-transparent"></div>
                    <div class="absolute bottom-0 left-0 right-0 p-6 md:p-10">
                        <div class="max-w-7xl mx-auto">
                            <h2 class="text-2xl md:text-3xl font-extrabold text-white mb-1">${catName}</h2>
                            <p class="text-gray-200 text-sm md:text-base">${description} · ${products.length} สินค้า</p>
                        </div>
                    </div>
                </div>

                <!-- Products for this category -->
                <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                    <div class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-6">`;

            products.slice(0, 8).forEach((product, index) => {
                const rating = product.rating || 0;
                const reviews = product.reviews || 0;
                let starsHtml = '';
                for (let i = 1; i <= 5; i++) {
                    if (i <= Math.floor(rating)) starsHtml += '<i class="ph-fill ph-star text-yellow-400 text-xs"></i>';
                    else if (i === Math.ceil(rating) && !Number.isInteger(rating)) starsHtml += '<i class="ph-fill ph-star-half text-yellow-400 text-xs"></i>';
                    else starsHtml += '<i class="ph ph-star text-gray-300 text-xs"></i>';
                }

                const wishlist = JSON.parse(localStorage.getItem('btmusicdrive_wishlist') || '[]');
                const isWishlisted = wishlist.some(w => w.id === product.id);
                const heartClass = isWishlisted ? 'ph-fill ph-heart text-lg text-red-500' : 'ph ph-heart text-lg';
                const discountHtml = product.originalPrice ? `<span class="text-xs text-gray-400 line-through">฿${product.originalPrice.toLocaleString()}</span>` : '';
                const discountBadge = product.originalPrice ? `<span class="absolute top-2 left-2 bg-red-500 text-white px-2 py-0.5 rounded-full text-[10px] font-bold">-${Math.round((1 - product.price / product.originalPrice) * 100)}%</span>` : '';

                html += `
                    <div class="bg-white rounded-xl overflow-hidden border border-gray-100 hover:shadow-md transition-shadow animate-fade-in-up" style="animation-delay:${index * 0.05}s">
                        <a href="product.html?id=${product.id}" class="block relative aspect-square overflow-hidden group cursor-pointer">
                            <img src="${product.imageUrl}" alt="${product.name}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
                            ${discountBadge}
                            <button class="absolute top-2 right-2 bg-white/80 p-1.5 rounded-full text-gray-400 hover:text-red-500 shadow-sm transition-colors z-10" data-wishlist="${product.id}" onclick="event.preventDefault();event.stopPropagation();">
                                <i class="${heartClass}"></i>
                            </button>
                        </a>
                        <div class="p-3">
                            <a href="product.html?id=${product.id}" class="block">
                                <h3 class="text-sm font-semibold text-gray-900 mb-1 line-clamp-2 leading-tight hover:text-primary transition-colors">${product.name}</h3>
                            </a>
                            <div class="flex items-center gap-1 mb-2">
                                ${starsHtml}
                                <span class="text-[10px] text-gray-400 ml-0.5">(${reviews})</span>
                            </div>
                            <div class="flex items-center justify-between">
                                <div>
                                    <span class="text-base font-bold text-gray-900">฿${product.price.toLocaleString()}</span>
                                    ${discountHtml ? '<br>' + discountHtml : ''}
                                </div>
                                <button class="cat-add-cart bg-primary hover:bg-amber-700 text-white p-2 rounded-lg transition-colors" data-id="${product.id}">
                                    <i class="ph ph-shopping-cart text-lg"></i>
                                </button>
                            </div>
                        </div>
                    </div>`;
            });

            html += `</div>`;

            // Show "view all" link if more than 8 products
            if (products.length > 8) {
                html += `
                    <div class="text-center mt-6">
                        <a href="shop.html?category=${encodeURIComponent(catName)}" class="inline-flex items-center gap-2 px-6 py-2.5 border-2 border-primary text-primary font-semibold rounded-full hover:bg-primary hover:text-white transition-all text-sm">
                            ดูทั้งหมดในหมวด ${catName} (${products.length}) <i class="ph ph-arrow-right"></i>
                        </a>
                    </div>`;
            }

            html += `</div></section>`;
        });

        container.innerHTML = html;
    }

    function setupEvents() {
        // Add to cart
        document.getElementById('all-categories-container').addEventListener('click', e => {
            const btn = e.target.closest('.cat-add-cart');
            if (!btn) return;
            const productId = btn.dataset.id;
            const product = allProducts.find(p => p.id === productId);
            if (product && typeof addToCart === 'function') addToCart(product);
        });

        // Wishlist
        document.getElementById('all-categories-container').addEventListener('click', e => {
            const btn = e.target.closest('[data-wishlist]');
            if (!btn) return;
            const productId = btn.dataset.wishlist;
            const product = allProducts.find(p => p.id === productId);
            if (!product) return;
            let wishlist = JSON.parse(localStorage.getItem('btmusicdrive_wishlist') || '[]');
            const idx = wishlist.findIndex(w => w.id === productId);
            const icon = btn.querySelector('i');
            if (idx >= 0) {
                wishlist.splice(idx, 1);
                if (icon) icon.className = 'ph ph-heart text-lg';
            } else {
                wishlist.push({ id: product.id, name: product.name, price: product.price, image: product.imageUrl || product.image });
                if (icon) icon.className = 'ph-fill ph-heart text-lg text-red-500';
            }
            localStorage.setItem('btmusicdrive_wishlist', JSON.stringify(wishlist));
        });

        // Smooth scroll for nav chips
        document.querySelectorAll('#cat-chips a[href^="#cat-"]').forEach(link => {
            link.addEventListener('click', e => {
                e.preventDefault();
                const target = document.querySelector(decodeURIComponent(link.getAttribute('href')));
                if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
        });
    }
    </script>
</body>
</html>
