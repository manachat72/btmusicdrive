<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รายชื่อเพลงทั้งหมด — btmusicdrive</title>
  <meta name="description" content="รวมรายชื่อเพลงทั้งหมดในแฟลชไดร์ฟเพลง btmusicdrive">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#8B7355',
            secondary: '#0F172A',
          }
        }
      }
    };
  </script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Kanit', 'Inter', sans-serif; }
    .cat-chip { transition: all .2s; cursor: pointer; }
    .cat-chip.active { background: var(--brand-secondary, #0F172A); color: #fff; }
    .cat-chip:not(.active):hover { background: #e2e8f0; }
    .track-row { transition: background .15s; }
    .track-row:hover { background: #f8fafc; }

  </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased">

  <!-- Shared Navbar -->
  <header id="site-header"></header>

  <main class="pt-20 pb-16">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

      <!-- Breadcrumb -->
      <nav class="mb-6 text-sm text-gray-500">
        <a href="index.html" class="hover:text-primary">หน้าแรก</a>
        <span class="mx-2">/</span>
        <span class="text-gray-700 font-medium">รายชื่อเพลงทั้งหมด</span>
      </nav>

      <!-- Header -->
      <div class="text-center mb-10">
        <h1 class="text-3xl md:text-4xl font-extrabold text-gray-900 mb-3">
          <i class="ph ph-music-notes-simple text-primary"></i> รายชื่อเพลงทั้งหมด
        </h1>
        <p class="text-gray-500 text-lg">เลือกดูรายชื่อเพลงแต่ละชุด</p>
        <p id="total-count" class="text-sm text-gray-400 mt-2"></p>
      </div>

      <!-- Search -->
      <div class="max-w-xl mx-auto mb-8">
        <div class="relative">
          <i class="ph ph-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-xl"></i>
          <input type="text" id="song-search" placeholder="ค้นหาชื่อเพลง..." 
            class="w-full pl-12 pr-4 py-3.5 bg-white border border-gray-200 rounded-xl text-base focus:ring-2 focus:ring-primary/30 focus:border-primary transition shadow-sm" 
            oninput="filterSongs()">
        </div>
      </div>

      <!-- Category Chips -->
      <div class="flex flex-wrap justify-center gap-2 mb-8" id="cat-chips">
        <!-- Chips generated by JS -->
      </div>

      <!-- Loading -->
      <div id="songs-loading" class="text-center py-16">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-primary mx-auto"></div>
        <p class="mt-3 text-gray-400">กำลังโหลดรายชื่อเพลง...</p>
      </div>

      <!-- Songs List -->
      <div id="songs-container" class="hidden">
        <!-- Product groups will be renders here -->
      </div>

      <!-- No Results -->
      <div id="no-results" class="hidden text-center py-16">
        <i class="ph ph-music-note-simple text-5xl text-gray-300 mb-3"></i>
        <p class="text-gray-400 font-medium text-lg">ไม่พบเพลงที่ค้นหา</p>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <div id="site-footer"></div>

  <!-- Toast -->
  <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

  <script src="components.js"></script>
  <script>
    const SONGS_API_BASE = (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost')
      ? 'http://localhost:5000/api' : '/api';

    let allProducts = [];
    let activeCategory = 'all';

    // ── Load ─────────────────────────────────────────────────────────────────
    async function loadAllSongs() {
      try {
        let res;
        try {
          res = await fetch(`${SONGS_API_BASE}/products`);
          if (!res.ok) throw new Error();
          const json = await res.json();
          allProducts = Array.isArray(json) ? json : (json.data || []);
        } catch {
          const fb = await fetch('products.json');
          allProducts = await fb.json();
        }
      } catch {
        allProducts = [];
      }

      // Filter to products with tracklists
      allProducts = allProducts.filter(p => p.tracklist && p.tracklist.length > 0);

      document.getElementById('songs-loading').classList.add('hidden');
      document.getElementById('songs-container').classList.remove('hidden');

      renderCategoryChips();
      renderSongs();
    }

    // ── Category Chips ───────────────────────────────────────────────────────
    function renderCategoryChips() {
      const chips = document.getElementById('cat-chips');
      const totalSongs = allProducts.reduce((sum, p) => sum + p.tracklist.length, 0);

      let html = `<button class="cat-chip active px-4 py-2 rounded-full text-sm font-semibold bg-secondary text-white border border-gray-200" onclick="setCategory('all')">
        ทั้งหมด <span class="ml-1 text-xs opacity-70">(${totalSongs})</span>
      </button>`;

      allProducts.forEach(p => {
        const catName = p.category?.name || 'อื่นๆ';
        html += `<button class="cat-chip px-4 py-2 rounded-full text-sm font-semibold bg-white text-gray-600 border border-gray-200" 
          onclick="setCategory('${p.id}')" data-id="${p.id}">
          ${esc(catName)} <span class="ml-1 text-xs opacity-70">(${p.tracklist.length})</span>
        </button>`;
      });

      chips.innerHTML = html;
    }

    function setCategory(cat) {
      activeCategory = cat;
      // Update chip UI
      document.querySelectorAll('.cat-chip').forEach(c => {
        const isActive = cat === 'all' ? c.textContent.includes('ทั้งหมด') : c.dataset.id === cat;
        c.classList.toggle('active', isActive);
      });
      renderSongs();
    }

    // ── Render Songs ─────────────────────────────────────────────────────────
    function renderSongs() {
      const container = document.getElementById('songs-container');
      const noResults = document.getElementById('no-results');
      const searchQuery = (document.getElementById('song-search').value || '').trim().toLowerCase();

      const filtered = activeCategory === 'all' ? allProducts : allProducts.filter(p => p.id === activeCategory);

      let totalShown = 0;
      let html = '';

      filtered.forEach(product => {
        let tracks = product.tracklist || [];

        // Filter by search
        if (searchQuery) {
          tracks = tracks.filter(t => {
            const name = (typeof t === 'string' ? t : t.name || '').toLowerCase();
            return name.includes(searchQuery);
          });
        }

        if (tracks.length === 0) return;
        totalShown += tracks.length;

        html += `
        <div class="mb-8">
          <div class="flex items-center gap-3 mb-4">
            <a href="product.html?id=${product.id}" class="flex items-center gap-3 group">
              <img src="${esc(product.imageUrl)}" alt="${esc(product.name)}" class="w-12 h-12 rounded-lg object-cover border border-gray-200 group-hover:border-primary transition">
              <div>
                <h2 class="text-lg font-bold text-gray-900 group-hover:text-primary transition">${esc(product.name)}</h2>
                <span class="text-xs text-gray-400">${esc(product.category?.name || '')} • ${product.tracklist.length} เพลง</span>
              </div>
            </a>
          </div>
          <div class="bg-white rounded-xl border border-gray-200 overflow-hidden divide-y divide-gray-100">
            ${tracks.map((t, i) => {
              const name = esc(typeof t === 'string' ? t : t.name || '');
              const originalIndex = product.tracklist.indexOf(t);
              return `
              <div class="track-row flex items-center gap-3 px-4 py-3" data-track="${name.toLowerCase()}">
                <span class="text-xs font-bold text-gray-400 w-7 text-right shrink-0">${originalIndex + 1}</span>
                <i class="ph ph-music-note text-primary text-sm shrink-0"></i>
                <span class="text-sm text-gray-700 flex-1 min-w-0 truncate font-medium">${name}</span>
              </div>`;
            }).join('')}
          </div>
        </div>`;
      });

      // Update total count
      const allSongs = allProducts.reduce((s, p) => s + p.tracklist.length, 0);
      document.getElementById('total-count').textContent = `รวมทั้งหมด ${allSongs} เพลง จาก ${allProducts.length} ชุด`;

      if (totalShown === 0) {
        container.innerHTML = '';
        noResults.classList.remove('hidden');
      } else {
        container.innerHTML = html;
        noResults.classList.add('hidden');
      }
    }

    function filterSongs() {
      renderSongs();
    }

    // ── Utils ────────────────────────────────────────────────────────────────
    function esc(str) {
      const d = document.createElement('div');
      d.appendChild(document.createTextNode(String(str || '')));
      return d.innerHTML;
    }

    // ── Init ─────────────────────────────────────────────────────────────────
    loadAllSongs();
  </script>
</body>
</html>
