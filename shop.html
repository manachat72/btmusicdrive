    let inStockOnly = false;
    let onSaleOnly = false;

    const DEFAULT_TITLE = document.title;
    const DEFAULT_META_DESC = document.querySelector('meta[name="description"]')?.content || '';

    // Read category from URL param
    const urlParams = new URLSearchParams(window.location.search);
    const urlCategory = urlParams.get('category');
    const urlSearch = urlParams.get('search');

    // Pre-fill search from URL param
    if (urlSearch) {
        searchQuery = urlSearch;
    }

    document.addEventListener('DOMContentLoaded', async () => {
        await loadCategoryData();
        // Redirect ?category=X → /category/:slug using loaded categoryData
        if (urlCategory) {
            const match = categoryData.find(c => c.name === urlCategory);
            if (match?.slug) { window.location.replace(`/category/${match.slug}`); return; }
        }
        await loadShopProducts();
        setupShopEvents();
        setupMobileFilterDrawer();
        renderRecentlyViewed();
        if (urlSearch) {
            const inp = document.getElementById('search-input');
            if (inp) inp.value = urlSearch;
        }
    });

    async function loadShopProducts() {
        try {
            let response;
            try {
                response = await fetch(`${API_BASE}/products`);
                if (!response.ok) throw new Error('API failed');
            } catch {
                response = await fetch('products.json');
            }
            if (!response.ok) throw new Error('Failed to fetch');
            const json = await response.json();
            shopProducts = Array.isArray(json) ? json : (json.data || []);

            // Extract unique categories
            const catMap = new Map();
            shopProducts.forEach(p => {
                const catName = p.category?.name || p.category || 'อื่นๆ';
                const catId = p.categoryId || p.category?.id || catName;
                if (!catMap.has(catName)) catMap.set(catName, catId);
            });
            allCategories = Array.from(catMap.entries()).map(([name, id]) => ({ id, name }));

            // Set active category from URL
            if (urlCategory) {
                const found = allCategories.find(c => c.name === urlCategory || c.id === urlCategory);
                if (found) {
                    activeCategory = found.name;
                    document.getElementById('page-title').textContent = found.name;
                    document.getElementById('breadcrumb-current').textContent = found.name;
                }
            }

            renderCategoryChips();
            renderSidebarCategories();
            renderShopProducts();
            updateCategoryBanner(activeCategory);
        } catch (err) {
            console.error(err);
            document.getElementById('shop-products').innerHTML = '<div class="col-span-full text-center py-16 text-red-500"><i class="ph ph-warning-circle text-5xl mb-3"></i><p class="font-semibold">ไม่สามารถโหลดสินค้าได้</p></div>';
        }
    }

    async function loadCategoryData() {
        if (Array.isArray(window.__CATEGORIES__)) {
            categoryData = window.__CATEGORIES__;
            return;
        }
        try {
            const res = await fetch('categories.json');
            if (res.ok) categoryData = await res.json();
        } catch { /* silently ignore — banner just won't show */ }
    }

    function updateCategoryBanner(catName) {
        const banner = document.getElementById('category-banner');
        const img = document.getElementById('category-banner-img');
        const title = document.getElementById('category-banner-title');
        const desc = document.getElementById('category-banner-desc');
        const metaDesc = document.querySelector('meta[name="description"]');

        if (!banner) return;

        if (catName === 'all') {
            banner.classList.add('hidden');
            document.title = DEFAULT_TITLE;
            if (metaDesc) metaDesc.setAttribute('content', DEFAULT_META_DESC);
            return;
        }

        // Try to find by exact name, then by product's categoryId match
        let cat = categoryData.find(c => c.name === catName);
        if (!cat) {
            const product = shopProducts.find(p => (p.category?.name || p.category) === catName);
            const catId = product?.category?.id || product?.categoryId;
            if (catId) cat = categoryData.find(c => String(c.id) === String(catId));
        }

        const DEFAULT_BANNER = 'https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?ixlib=rb-4.0.3&auto=format&fit=crop&w=1400&q=80';

        img.src = cat?.imageUrl || DEFAULT_BANNER;
        img.alt = catName + ' — แฟลชไดร์ฟเพลง MP3 Bt music drive';
        title.textContent = catName;
        desc.textContent = cat?.h1Description || `รวมสินค้าคุณภาพในหมวด ${catName}`;
        document.title = cat?.titleTag || `${catName} — Bt music drive`;
        if (metaDesc) metaDesc.setAttribute('content', cat?.metaDescription || `เลือกซื้อแฟลชไดร์ฟเพลง ${catName} MP3 เสียงชัด HD จัดส่งทั่วไทย`);
        banner.classList.remove('hidden');
    }

    function renderCategoryChips() {
        const container = document.getElementById('category-chips');
        let html = `<button class="category-chip px-4 py-2 rounded-full border border-gray-200 text-sm font-medium ${activeCategory === 'all' ? 'active' : ''}" data-cat="all">ทั้งหมด</button>`;
        allCategories.forEach(c => {
            html += `<button class="category-chip px-4 py-2 rounded-full border border-gray-200 text-sm font-medium ${activeCategory === c.name ? 'active' : ''}" data-cat="${c.name}">${c.name}</button>`;
        });
        container.innerHTML = html;
    }

    function renderSidebarCategories() {
        const container = document.getElementById('sidebar-categories');
        let html = `<label class="flex items-center gap-2 cursor-pointer text-sm"><input type="radio" name="sidebar-cat" value="all" ${activeCategory === 'all' ? 'checked' : ''} class="text-primary focus:ring-primary"> ทั้งหมด</label>`;
        allCategories.forEach(c => {
            const count = shopProducts.filter(p => (p.category?.name || p.category) === c.name).length;
            html += `<label class="flex items-center gap-2 cursor-pointer text-sm"><input type="radio" name="sidebar-cat" value="${c.name}" ${activeCategory === c.name ? 'checked' : ''} class="text-primary focus:ring-primary"> ${c.name} <span class="text-gray-400">(${count})</span></label>`;
        });
        container.innerHTML = html;
    }

    function getFilteredProducts() {
        let filtered = [...shopProducts];

        // Category filter
        if (activeCategory !== 'all') {
            filtered = filtered.filter(p => (p.category?.name || p.category) === activeCategory);
        }

        // Search filter
        if (searchQuery) {
            const q = searchQuery.toLowerCase();
            filtered = filtered.filter(p =>
                p.name.toLowerCase().includes(q) ||
                (p.description || '').toLowerCase().includes(q) ||
                (p.tags || []).some(t => t.toLowerCase().includes(q))
            );
        }

        // Price filter
        if (priceMin !== null) filtered = filtered.filter(p => p.price >= priceMin);
        if (priceMax !== null) filtered = filtered.filter(p => p.price <= priceMax);

        // Rating filter
        if (ratingFilter > 0) filtered = filtered.filter(p => (p.rating || 0) >= ratingFilter);

        // Availability filters
        if (inStockOnly) filtered = filtered.filter(p => p.stock !== 0 && p.inStock !== false);
        if (onSaleOnly) filtered = filtered.filter(p => p.originalPrice && p.originalPrice > p.price);

        // Sort
        switch (currentSort) {
            case 'price-asc': filtered.sort((a, b) => a.price - b.price); break;
            case 'price-desc': filtered.sort((a, b) => b.price - a.price); break;
            case 'rating': filtered.sort((a, b) => (b.rating || 0) - (a.rating || 0)); break;
            case 'name': filtered.sort((a, b) => a.name.localeCompare(b.name, 'th')); break;
        }

        return filtered;
    }

    function renderShopProducts() {
        const container = document.getElementById('shop-products');
        const noResults = document.getElementById('no-results');
        const filtered = getFilteredProducts();

        // Update count
        document.getElementById('product-count-text').textContent = `แสดง ${filtered.length} จาก ${shopProducts.length} รายการ`;

        if (filtered.length === 0) {
            container.innerHTML = '';
            noResults.classList.remove('hidden');
            return;
        }
        noResults.classList.add('hidden');

        // Grid or list
        if (viewMode === 'grid') {
            container.className = 'grid grid-cols-2 gap-3 sm:gap-4 md:grid-cols-3 lg:grid-cols-4';
        } else {
            container.className = 'flex flex-col gap-4';
        }

        container.innerHTML = filtered.map((product, index) => {
            const rating = product.rating || 0;
            const reviews = product.reviews || 0;
            let starsHtml = '';
            for (let i = 1; i <= 5; i++) {
                if (i <= Math.floor(rating)) starsHtml += `<i class="ph-fill ph-star text-yellow-400 text-sm"></i>`;
                else if (i === Math.ceil(rating) && !Number.isInteger(rating)) starsHtml += `<i class="ph-fill ph-star-half text-yellow-400 text-sm"></i>`;
                else starsHtml += `<i class="ph ph-star text-gray-300 text-sm"></i>`;
            }

            const wishlist = JSON.parse(localStorage.getItem('btmusicdrive_wishlist') || '[]');
            const isWishlisted = wishlist.some(w => w.id === product.id);
            const heartClass = isWishlisted ? 'ph-fill ph-heart text-xl text-red-500' : 'ph ph-heart text-xl';

            const hasDiscount = product.originalPrice && product.originalPrice > product.price;
            const discPct = hasDiscount ? Math.round((1 - product.price / product.originalPrice) * 100) : 0;
            const fmtP = p => `฿${Math.round(p).toLocaleString('th-TH')}`;
            const origHtml = hasDiscount ? `<span class="text-[10px] sm:text-xs text-gray-400 line-through">${fmtP(product.originalPrice)}</span>` : '';
            const discBadge = hasDiscount ? `<span class="absolute top-2 left-2 bg-red-500 text-white px-2 py-0.5 rounded-full text-[10px] sm:text-xs font-bold shadow-sm">-${discPct}%</span>` : '';

            const pUrl = product.slug ? `/product/${product.slug}` : `product.html?id=${product.id}`;
            if (viewMode === 'list') {
                return `
                <div class="bg-white rounded-2xl border border-gray-100 flex overflow-hidden shadow-[0_4px_20px_rgba(0,0,0,0.06)] hover:shadow-[0_12px_36px_rgba(139,115,85,0.16)] transition-all duration-300 animate-fade-in-up" style="animation-delay:${index * 0.05}s">
                    <a href="${pUrl}" class="w-36 sm:w-48 flex-shrink-0 overflow-hidden relative">
                        <img src="${product.imageUrl}" alt="${product.name}" loading="lazy" decoding="async" class="w-full h-full object-cover hover:scale-105 transition-transform duration-500">
                        ${discBadge}
                    </a>
                    <div class="p-3 sm:p-5 flex-1 flex flex-col justify-between min-w-0">
                        <div>
                            <div class="text-[10px] sm:text-xs text-gray-400 font-medium uppercase tracking-wider mb-0.5">${product.category?.name || product.category || ''}</div>
                            <a href="${pUrl}" class="block"><h3 class="text-sm sm:text-base font-bold text-gray-900 hover:text-primary transition-colors line-clamp-2">${product.name}</h3></a>
                            <div class="flex items-center mt-1.5">${starsHtml}<span class="text-[10px] sm:text-xs text-gray-400 ml-1.5">(${reviews})</span></div>
                        </div>
                        <div class="flex items-center justify-between mt-3 gap-2 flex-wrap">
                            <div class="flex items-baseline gap-1.5 flex-wrap">
                                <span class="text-base sm:text-xl font-extrabold text-primary">${fmtP(product.price)}</span>
                                ${origHtml}
                            </div>
                            <button class="shop-add-cart bg-primary hover:bg-amber-700 active:scale-95 text-white font-bold rounded-full w-8 h-8 flex items-center justify-center text-lg leading-none transition-all flex-shrink-0" data-id="${product.id}" onclick="event.preventDefault();event.stopPropagation();" aria-label="เพิ่มลงตะกร้า">+</button>
                        </div>
                    </div>
                </div>`;
            }

            return `
            <div class="bg-white rounded-2xl overflow-hidden border border-gray-100 shadow-[0_4px_20px_rgba(0,0,0,0.06)] hover:shadow-[0_12px_36px_rgba(139,115,85,0.16)] transition-all duration-300 animate-fade-in-up" style="animation-delay:${index * 0.05}s">
                <a href="${pUrl}" class="block relative aspect-square overflow-hidden group cursor-pointer">
                    <img src="${product.imageUrl}" alt="${product.name}" loading="lazy" decoding="async" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/30 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                    ${discBadge}
                    <button class="absolute top-2 right-2 bg-white/90 backdrop-blur-sm p-1.5 rounded-full text-gray-400 hover:text-red-500 shadow-sm transition-colors z-10 shop-wishlist-btn" data-id="${product.id}" onclick="event.preventDefault();event.stopPropagation();">
                        <i class="${heartClass}"></i>
                    </button>
                </a>
                <div class="p-2.5 sm:p-4">
                    <div class="text-[10px] sm:text-xs text-gray-400 font-medium mb-0.5 uppercase tracking-wider">${product.category?.name || product.category || ''}</div>
                    <a href="${pUrl}" class="block"><h3 class="text-xs sm:text-sm font-bold text-gray-900 mb-1 line-clamp-2 hover:text-primary transition-colors leading-snug">${product.name}</h3></a>
                    <div class="flex items-center mb-2">
                        <div class="flex mr-1">${starsHtml}</div>
                        <span class="text-[10px] sm:text-xs text-gray-400">(${reviews})</span>
                    </div>
                    <div class="flex items-center justify-between gap-2 mb-2">
                        <div class="flex items-baseline gap-1.5 flex-wrap">
                            <span class="text-sm sm:text-base font-extrabold text-primary">${fmtP(product.price)}</span>
                            ${origHtml}
                        </div>
                        <button class="shop-add-cart bg-primary hover:bg-amber-700 active:scale-95 text-white font-bold rounded-full w-7 h-7 sm:w-8 sm:h-8 flex items-center justify-center text-base sm:text-lg leading-none transition-all flex-shrink-0" data-id="${product.id}" onclick="event.preventDefault();event.stopPropagation();" aria-label="เพิ่มลงตะกร้า">+</button>
                    </div>
                </div>
            </div>`;
        }).join('');

        // Direct binding — bulletproof: attach handler to each button after render
        container.querySelectorAll('.shop-add-cart').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                _handleShopAddToCart(this.dataset.id);
            });
        });

        // Wishlist buttons on grid cards
        container.querySelectorAll('.shop-wishlist-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                const id = this.dataset.id;
                const p = shopProducts.find(x => x.id === id);
                if (!p) return;
                let wl = [];
                try { wl = JSON.parse(localStorage.getItem('btmusicdrive_wishlist') || '[]'); } catch { }
                const idx = wl.findIndex(x => x.id === id);
                if (idx >= 0) {
                    wl.splice(idx, 1);
                    this.querySelector('i').className = 'ph ph-heart text-base';
                } else {
                    wl.push({ id: p.id, name: p.name, price: p.price, image: p.imageUrl });
                    this.querySelector('i').className = 'ph-fill ph-heart text-base text-red-500';
                }
                localStorage.setItem('btmusicdrive_wishlist', JSON.stringify(wl));
                if (typeof _updateWishlistBadge === 'function') _updateWishlistBadge();
            });
        });
    }

    function _handleShopAddToCart(productId) {
        if (!productId) return;

        // Always handle cart directly using shopProducts data
        let cart = [];
        try { cart = JSON.parse(localStorage.getItem('btmusicdrive_cart') || '[]'); } catch { cart = []; }
        const existing = cart.find(c => c.id === productId);
        if (existing) {
            existing.quantity++;
        } else {
            const product = shopProducts.find(p => p.id === productId);
            if (product) {
                cart.push({
                    id: productId,
                    name: product.name,
                    price: product.price,
                    image: product.imageUrl || product.image,
                    category: product.category?.name || product.category || '',
                    quantity: 1
                });
            }
        }
        localStorage.setItem('btmusicdrive_cart', JSON.stringify(cart));

        // Sync with components.min.js cart UI
        if (typeof _loadCartFromStorage === 'function') _loadCartFromStorage();
        if (typeof _updateCartUI === 'function') _updateCartUI();

        // Also sync script.min.js cart array if available
        if (typeof window.cart !== 'undefined') {
            try { window.cart = JSON.parse(localStorage.getItem('btmusicdrive_cart') || '[]'); } catch {}
        }
        if (typeof updateCartUI === 'function') {
            try { updateCartUI(); } catch {}
        }

        // Sync with backend if logged in
        const token = localStorage.getItem('btmusicdrive_token');
        if (token) {
            fetch(`${API_BASE}/cart/items`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    Authorization: `Bearer ${token}`
                },
                body: JSON.stringify({ productId, quantity: 1 })
            }).catch(() => {});
        }

        // Show toast
        const productName = shopProducts.find(p => p.id === productId)?.name || 'สินค้า';
        if (typeof _showToast === 'function') {
            _showToast(`เพิ่ม "${productName}" ลงตะกร้าแล้ว`);
        } else if (typeof showToast === 'function') {
            showToast(`เพิ่ม "${productName}" ลงตะกร้าแล้ว`);
        }
    }

    function setupShopEvents() {
        // Category chips
        document.getElementById('category-chips').addEventListener('click', e => {
            const chip = e.target.closest('.category-chip');
            if (!chip) return;
            const catName = chip.dataset.cat;
            if (catName !== 'all') {
                const cat = categoryData.find(c => c.name === catName);
                if (cat?.slug) { window.location.href = `/category/${cat.slug}`; return; }
            }
            activeCategory = catName;
            document.getElementById('page-title').textContent = activeCategory === 'all' ? 'สินค้าทั้งหมด' : activeCategory;
            document.getElementById('breadcrumb-current').textContent = activeCategory === 'all' ? 'สินค้าทั้งหมด' : activeCategory;
            renderCategoryChips();
            renderSidebarCategories();
            renderShopProducts();
            updateCategoryBanner(activeCategory);
            const url = new URL(window.location);
            url.searchParams.delete('category');
            history.replaceState(null, '', url);
        });

        // Sidebar category radios
        document.getElementById('sidebar-categories').addEventListener('change', e => {
            if (e.target.name === 'sidebar-cat') {
                const catName = e.target.value;
                if (catName !== 'all') {
                    const cat = categoryData.find(c => c.name === catName);
                    if (cat?.slug) { window.location.href = `/category/${cat.slug}`; return; }
                }
                activeCategory = catName;
                document.getElementById('page-title').textContent = activeCategory === 'all' ? 'สินค้าทั้งหมด' : activeCategory;
                document.getElementById('breadcrumb-current').textContent = activeCategory === 'all' ? 'สินค้าทั้งหมด' : activeCategory;
                renderCategoryChips();
                renderShopProducts();
                updateCategoryBanner(activeCategory);
            }
        });

        // Search
        let searchTimeout;
        document.getElementById('search-input').addEventListener('input', e => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                const newQuery = e.target.value.trim();
                if (newQuery && newQuery !== searchQuery && typeof fbq === 'function') {
                    fbq('track', 'Search', { search_string: newQuery });
                }
                searchQuery = newQuery;
                renderShopProducts();
            }, 300);
        });

        // Sort
        document.getElementById('sort-select').addEventListener('change', e => {
            currentSort = e.target.value;
            renderShopProducts();
        });

        // Price filter
        document.getElementById('apply-price-filter').addEventListener('click', () => {
            const min = document.getElementById('price-min').value;
            const max = document.getElementById('price-max').value;
            priceMin = min ? Number(min) : null;
            priceMax = max ? Number(max) : null;
            renderShopProducts();
            updateActiveFilterCount();
        });

        // Rating filter
        document.getElementById('rating-filters').addEventListener('change', e => {
            if (e.target.name === 'rating-filter') {
                ratingFilter = Number(e.target.value);
                renderShopProducts();
                updateActiveFilterCount();
            }
        });

        // Clear filters
        document.getElementById('clear-filters').addEventListener('click', () => {
            activeCategory = 'all';
            searchQuery = '';
            currentSort = 'default';
            priceMin = null;
            priceMax = null;
            ratingFilter = 0;
            inStockOnly = false;
            onSaleOnly = false;
            document.getElementById('search-input').value = '';
            document.getElementById('sort-select').value = 'default';
            document.getElementById('price-min').value = '';
            document.getElementById('price-max').value = '';
            document.getElementById('in-stock-only').checked = false;
            document.getElementById('on-sale-only').checked = false;
            document.getElementById('page-title').textContent = 'สินค้าทั้งหมด';
            document.getElementById('breadcrumb-current').textContent = 'สินค้าทั้งหมด';
            const url = new URL(window.location);
            url.searchParams.delete('category');
            history.replaceState(null, '', url);
            renderCategoryChips();
            renderSidebarCategories();
            renderShopProducts();
            updateCategoryBanner('all');
            document.querySelectorAll('input[name="rating-filter"]').forEach(r => r.checked = r.value === '0');
            updateActiveFilterCount();
        });

        // Availability filters
        document.getElementById('in-stock-only')?.addEventListener('change', e => {
            inStockOnly = e.target.checked;
            renderShopProducts();
            updateActiveFilterCount();
        });
        document.getElementById('on-sale-only')?.addEventListener('change', e => {
            onSaleOnly = e.target.checked;
            renderShopProducts();
            updateActiveFilterCount();
        });

        // View toggle
        document.getElementById('view-grid')?.addEventListener('click', () => {
            viewMode = 'grid';
            document.getElementById('view-grid').className = 'p-2.5 bg-gray-100 text-gray-700';
            document.getElementById('view-list').className = 'p-2.5 text-gray-400 hover:text-gray-700 transition-colors';
            renderShopProducts();
        });
        document.getElementById('view-list')?.addEventListener('click', () => {
            viewMode = 'list';
            document.getElementById('view-list').className = 'p-2.5 bg-gray-100 text-gray-700';
            document.getElementById('view-grid').className = 'p-2.5 text-gray-400 hover:text-gray-700 transition-colors';
            renderShopProducts();
        });

        // Add to cart — attach directly to product container for reliability
        const shopContainer = document.getElementById('shop-products');
        if (shopContainer) {
            shopContainer.addEventListener('click', e => {
                const btn = e.target.closest('.shop-add-cart');
                if (!btn) return;
                e.preventDefault();
                e.stopPropagation();
                _handleShopAddToCart(btn.dataset.id);
            });
        }
        // Also listen on document as fallback (for list view buttons outside container)
        document.addEventListener('click', e => {
            const btn = e.target.closest('.shop-add-cart');
            if (!btn) return;
            e.preventDefault();
            e.stopPropagation();
            _handleShopAddToCart(btn.dataset.id);
        });

        // Wishlist removed from shop page
    }

    // ── Active Filter Count Badge ─────────────────────────────────
    function updateActiveFilterCount() {
        let count = 0;
        if (activeCategory !== 'all') count++;
        if (priceMin !== null || priceMax !== null) count++;
        if (ratingFilter > 0) count++;
        if (inStockOnly) count++;
        if (onSaleOnly) count++;
        const badge = document.getElementById('active-filter-count');
        if (badge) {
            badge.textContent = count;
            badge.classList.toggle('hidden', count === 0);
        }
    }

    // ── Mobile Filter Drawer ──────────────────────────────────────
    function setupMobileFilterDrawer() {
        const btn = document.getElementById('mobile-filter-btn');
        const drawer = document.getElementById('mobile-filter-drawer');
        const overlay = document.getElementById('mobile-filter-overlay');
        const closeBtn = document.getElementById('close-mobile-filter');
        const clearBtn = document.getElementById('mobile-clear-filters');
        const applyBtn = document.getElementById('mobile-apply-filters');
        const content = document.getElementById('mobile-filter-content');

        function openDrawer() {
            // Clone current filter sidebar content into mobile drawer
            const sidebar = document.querySelector('#filter-sidebar .sticky');
            if (sidebar && content) {
                content.innerHTML = sidebar.innerHTML;
                // Sync current state
                const catRadios = content.querySelectorAll('input[name="sidebar-cat"]');
                catRadios.forEach(r => { r.name = 'mobile-sidebar-cat'; r.checked = r.value === activeCategory; });
                const ratingRadios = content.querySelectorAll('input[name="rating-filter"]');
                ratingRadios.forEach(r => { r.name = 'mobile-rating-filter'; r.checked = Number(r.value) === ratingFilter; });
                const stockCb = content.querySelector('#in-stock-only');
                if (stockCb) { stockCb.id = 'mobile-in-stock-only'; stockCb.checked = inStockOnly; }
                const saleCb = content.querySelector('#on-sale-only');
                if (saleCb) { saleCb.id = 'mobile-on-sale-only'; saleCb.checked = onSaleOnly; }
                // Remove desktop clear button (we have footer buttons)
                const clearDesktop = content.querySelector('#clear-filters');
                if (clearDesktop) clearDesktop.remove();
                // Remove recently viewed from mobile drawer
                const rv = content.querySelector('#recently-viewed-section');
                if (rv) rv.remove();
            }
            overlay?.classList.remove('hidden');
            drawer?.classList.remove('translate-y-full');
            document.body.style.overflow = 'hidden';
        }

        function closeDrawer() {
            drawer?.classList.add('translate-y-full');
            overlay?.classList.add('hidden');
            document.body.style.overflow = '';
        }

        function applyMobileFilters() {
            // Read values from mobile drawer
            const catRadio = content.querySelector('input[name="mobile-sidebar-cat"]:checked');
            if (catRadio) activeCategory = catRadio.value;

            const ratingRadio = content.querySelector('input[name="mobile-rating-filter"]:checked');
            if (ratingRadio) ratingFilter = Number(ratingRadio.value);

            const stockCb = content.querySelector('#mobile-in-stock-only');
            inStockOnly = stockCb ? stockCb.checked : false;
            const saleCb = content.querySelector('#mobile-on-sale-only');
            onSaleOnly = saleCb ? saleCb.checked : false;

            // Sync desktop sidebar
            document.getElementById('in-stock-only').checked = inStockOnly;
            document.getElementById('on-sale-only').checked = onSaleOnly;
            document.querySelectorAll('input[name="rating-filter"]').forEach(r => r.checked = Number(r.value) === ratingFilter);

            document.getElementById('page-title').textContent = activeCategory === 'all' ? 'สินค้าทั้งหมด' : activeCategory;
            document.getElementById('breadcrumb-current').textContent = activeCategory === 'all' ? 'สินค้าทั้งหมด' : activeCategory;

            renderCategoryChips();
            renderSidebarCategories();
            renderShopProducts();
            updateCategoryBanner(activeCategory);
            updateActiveFilterCount();
            closeDrawer();
        }

        btn?.addEventListener('click', openDrawer);
        closeBtn?.addEventListener('click', closeDrawer);
        overlay?.addEventListener('click', closeDrawer);
        applyBtn?.addEventListener('click', applyMobileFilters);
        clearBtn?.addEventListener('click', () => {
            document.getElementById('clear-filters')?.click();
            closeDrawer();
        });
    }

    // ── Recently Viewed ───────────────────────────────────────────
    function trackRecentlyViewed(product) {
        if (!product) return;
        let recent = JSON.parse(localStorage.getItem('btmusicdrive_recently_viewed') || '[]');
        recent = recent.filter(r => r.id !== product.id);
        recent.unshift({ id: product.id, name: product.name, price: product.price, image: product.imageUrl || product.image });
        if (recent.length > 6) recent = recent.slice(0, 6);
        localStorage.setItem('btmusicdrive_recently_viewed', JSON.stringify(recent));
    }

    function renderRecentlyViewed() {
        const container = document.getElementById('recently-viewed');
        const section = document.getElementById('recently-viewed-section');
        if (!container || !section) return;
        const recent = JSON.parse(localStorage.getItem('btmusicdrive_recently_viewed') || '[]');
        if (recent.length === 0) { section.style.display = 'none'; return; }
        section.style.display = '';
        container.innerHTML = recent.slice(0, 4).map(item => `
            <a href="product.html?id=${item.id}" class="flex items-center gap-3 group hover:bg-gray-50 rounded-lg p-1.5 -mx-1.5 transition-colors">
                <div class="w-12 h-12 rounded-lg overflow-hidden bg-gray-100 flex-shrink-0">
                    <img src="${item.image}" alt="${item.name} — แฟลชไดร์ฟเพลง MP3" loading="lazy" decoding="async" class="w-full h-full object-cover">
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-xs font-medium text-gray-700 truncate group-hover:text-primary transition-colors">${item.name}</p>
                    <p class="text-xs text-gray-500 font-bold">฿${item.price?.toFixed(2) || '0.00'}</p>
                </div>
            </a>
        `).join('');
    }
    </script>
