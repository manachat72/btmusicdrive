                <input id="pw-confirm" type="password" minlength="6" class="w-full border border-gray-200 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary/30 focus:border-primary outline-none transition" required>
              </div>
              <button type="submit" class="bg-secondary hover:bg-gray-700 text-white font-semibold px-8 py-3 rounded-lg transition-colors">เปลี่ยนรหัสผ่าน</button>

  <script src="components.min.js?v=2ed6e2a3"></script>
  <script>
    const API_BASE = (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost')
      ? 'http://localhost:5000/api'
      : '/api';

    document.addEventListener('DOMContentLoaded', async () => {
      const token = localStorage.getItem('btmusicdrive_token');
      if (!token) { location.href = '/'; return; }

      try {
        const res = await fetch(`${API_BASE}/auth/me`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        if (!res.ok) {
          localStorage.removeItem('btmusicdrive_token');
          location.href = '/';
          return;
        }
        const data = await res.json();
        const user = data.user;

        const fullName = user.name || '';
        const parts = fullName.trim().split(' ');

        document.getElementById('sidebar-user-name').textContent = fullName || 'ผู้ใช้';
        document.getElementById('sidebar-user-email').textContent = user.email || '';
        document.getElementById('pf-fname').value = parts[0] || '';
        document.getElementById('pf-lname').value = parts.slice(1).join(' ') || '';
        document.getElementById('pf-email').value = user.email || '';
        if (user.phone) document.getElementById('pf-phone').value = user.phone;
        if (user.birthday) document.getElementById('pf-birthday').value = user.birthday;
        if (user.gender) {
          const gInfo = document.querySelector(`input[name="gender"][value="${user.gender}"]`);
          if (gInfo) gInfo.checked = true;
        }
      } catch (e) {
        console.error(e);
        location.href = '/';
      }
    });

    async function saveProfile(e) {
      e.preventDefault();
      const token = localStorage.getItem('btmusicdrive_token');
      if (!token) { alert('กรุณาเข้าสู่ระบบก่อน'); return false; }

      const fname = document.getElementById('pf-fname').value;
      const lname = document.getElementById('pf-lname').value;
      const phone = document.getElementById('pf-phone').value;
      const birthday = document.getElementById('pf-birthday').value;
      const genderEl = document.querySelector('input[name="gender"]:checked');
      const gender = genderEl ? genderEl.value : '';

      const newName = `${fname} ${lname}`.trim();

      try {
        const res = await fetch(`${API_BASE}/users/me`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
          body: JSON.stringify({ name: newName, phone, birthday, gender })
        });
        if (res.ok) {
          document.getElementById('sidebar-user-name').textContent = newName || 'ผู้ใช้';
          alert('บันทึกข้อมูลเรียบร้อย');
        } else {
          const data = await res.json();
          alert(data.error || 'ไม่สามารถบันทึกข้อมูลได้');
        }
      } catch (err) {
        console.error('Save profile error:', err);
        alert('เกิดข้อผิดพลาด กรุณาลองอีกครั้ง');
      }
      return false;
    }

    function changePassword(e){
      e.preventDefault();
      const pw = document.getElementById('pw-new').value;
      const confirm = document.getElementById('pw-confirm').value;
      if(pw !== confirm){ alert('รหัสผ่านไม่ตรงกัน'); return false; }
      alert('เปลี่ยนรหัสผ่านเรียบร้อย');
      document.getElementById('passwordForm').reset();
      return false;
    }
  </script>
