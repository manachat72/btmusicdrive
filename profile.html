  <script>
    const API_BASE = (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost')
      ? 'http://localhost:5000/api'
      : '/api';

    let profileOrders = [];

    document.addEventListener('DOMContentLoaded', async () => {
      const token = localStorage.getItem('btmusicdrive_token');
      if (!token) { location.href = '/'; return; }

      try {
        const cachedUser = JSON.parse(localStorage.getItem('user') || 'null');
        const res = await fetch(`${API_BASE}/auth/me`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        if (!res.ok) {
          localStorage.removeItem('btmusicdrive_token');
          localStorage.removeItem('user');
          location.href = '/';
          return;
        }
        const data = await res.json();
        const user = { ...(cachedUser || {}), ...(data.user || {}) };
        localStorage.setItem('user', JSON.stringify(user));

        const fullName = user.name || '';
        document.getElementById('profile-display-name').textContent = fullName || 'ผู้ใช้';
        document.getElementById('profile-display-email').textContent = user.email || '-';
        document.getElementById('profile-meta-name').textContent = fullName || '-';
        document.getElementById('profile-meta-email').textContent = user.email || '-';
        document.getElementById('profile-meta-phone').textContent = user.phone || '-';
        document.getElementById('profile-meta-birthday').textContent = formatBirthday(user.birthday);
        document.getElementById('profile-meta-line').textContent = user.lineId || '-';
        document.getElementById('profile-meta-facebook').textContent = user.facebook || '-';
        renderProfileAvatar(user);
        await loadProfileOrders(token);
      } catch (e) {
        console.error(e);
        location.href = '/';
      }
    });

    async function loadProfileOrders(token) {
      try {
        const res = await fetch(`${API_BASE}/orders/my`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        if (!res.ok) {
          updateOrderStats([]);
          return;
        }

        const rawOrders = await res.json();
        profileOrders = rawOrders.map((order) => ({
          id: order.id || '',
          status: String(order.status || 'PENDING').toLowerCase(),
        }));

        updateOrderStats(profileOrders);
      } catch (error) {
        console.error('Profile orders error:', error);
        updateOrderStats([]);
      }
    }

    function updateOrderStats(orders = profileOrders) {
      const countBy = (statuses) => orders.filter((order) => statuses.includes(order.status)).length;
      document.getElementById('stat-delivered').textContent = String(countBy(['delivered']));
      document.getElementById('stat-shipped').textContent = String(countBy(['shipped']));
      document.getElementById('stat-processing').textContent = String(countBy(['processing', 'paid']));
      document.getElementById('stat-pending').textContent = String(countBy(['pending']));
    }

    function formatBirthday(value) {
      if (!value) return '-';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function renderProfileAvatar(user) {
      const avatarEl = document.getElementById('profile-avatar');
      if (!avatarEl) return;

      if (user?.avatar) {
        avatarEl.innerHTML = `<img src="${escapeHtml(user.avatar)}" alt="${escapeHtml(user.name || 'ผู้ใช้')}" class="w-full h-full object-cover rounded-full">`;
        return;
      }

      const initial = (user?.name || user?.email || 'U').trim().charAt(0).toUpperCase();
      avatarEl.innerHTML = `<span class="text-3xl font-semibold text-gray-500">${escapeHtml(initial)}</span>`;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.appendChild(document.createTextNode(String(str ?? '')));
      return div.innerHTML;
    }
  </script>
