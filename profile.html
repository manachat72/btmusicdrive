  <script>
    const API_BASE = (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost')
      ? 'http://localhost:5000/api'
      : '/api';

    let profileOrders = [];
    let currentUser = null;

    const GENDER_LABELS = { male: 'ชาย', female: 'หญิง', other: 'อื่นๆ' };

    document.addEventListener('DOMContentLoaded', async () => {
      const token = localStorage.getItem('btmusicdrive_token');
      if (!token) { location.href = '/'; return; }

      try {
        const cachedUser = JSON.parse(localStorage.getItem('user') || 'null');
        const res = await fetch(`${API_BASE}/auth/me`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        if (!res.ok) {
          localStorage.removeItem('btmusicdrive_token');
          localStorage.removeItem('user');
          location.href = '/';
          return;
        }
        const data = await res.json();
        const user = { ...(cachedUser || {}), ...(data.user || {}) };
        currentUser = user;
        localStorage.setItem('user', JSON.stringify(user));
        renderUser(user);
        await loadProfileOrders(token);
      } catch (e) {
        console.error(e);
        location.href = '/';
      }

      setupEditModal();
    });

    function renderUser(user) {
      const fullName = user.name || '';
      document.getElementById('profile-display-name').textContent = fullName || 'ผู้ใช้';
      document.getElementById('profile-display-email').textContent = user.email || '-';
      document.getElementById('profile-meta-name').textContent = fullName || '-';
      document.getElementById('profile-meta-email').textContent = user.email || '-';
      document.getElementById('profile-meta-phone').textContent = user.phone || '-';
      document.getElementById('profile-meta-birthday').textContent = formatBirthday(user.birthday);
      document.getElementById('profile-meta-gender').textContent = GENDER_LABELS[user.gender] || '-';
      const sidebarName = document.getElementById('sidebar-user-name');
      const sidebarEmail = document.getElementById('sidebar-user-email');
      if (sidebarName) sidebarName.textContent = fullName || 'ผู้ใช้';
      if (sidebarEmail) sidebarEmail.textContent = user.email || '-';
      renderProfileAvatar(user);
    }

    function setupEditModal() {
      const modal = document.getElementById('profile-edit-modal');
      const form = document.getElementById('profile-edit-form');
      const errEl = document.getElementById('profile-edit-error');
      const saveBtn = document.getElementById('profile-edit-save');

      const open = () => {
        if (!currentUser) return;
        form.name.value = currentUser.name || '';
        form.phone.value = currentUser.phone || '';
        form.birthday.value = toDateInputValue(currentUser.birthday);
        form.gender.value = currentUser.gender || '';
        errEl.classList.add('hidden');
        modal.classList.remove('hidden');
        modal.classList.add('flex');
      };
      const close = () => { modal.classList.add('hidden'); modal.classList.remove('flex'); };

      document.getElementById('btn-edit-profile').addEventListener('click', open);
      document.getElementById('profile-edit-close').addEventListener('click', close);
      document.getElementById('profile-edit-cancel').addEventListener('click', close);
      modal.addEventListener('click', (e) => { if (e.target === modal) close(); });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const token = localStorage.getItem('btmusicdrive_token');
        if (!token) { location.href = '/'; return; }
        const payload = {
          name: form.name.value.trim(),
          phone: form.phone.value.trim(),
          birthday: form.birthday.value || null,
          gender: form.gender.value || null,
        };
        saveBtn.disabled = true;
        errEl.classList.add('hidden');
        try {
          const res = await fetch(`${API_BASE}/users/me`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
            body: JSON.stringify(payload),
          });
          if (!res.ok) {
            const body = await res.json().catch(() => ({}));
            throw new Error(body.error || 'บันทึกไม่สำเร็จ');
          }
          const updated = await res.json();
          currentUser = { ...currentUser, ...updated };
          localStorage.setItem('user', JSON.stringify(currentUser));
          renderUser(currentUser);
          close();
        } catch (err) {
          errEl.textContent = err.message || 'บันทึกไม่สำเร็จ';
          errEl.classList.remove('hidden');
        } finally {
          saveBtn.disabled = false;
        }
      });
    }

    function toDateInputValue(value) {
      if (!value) return '';
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return '';
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    }

    async function loadProfileOrders(token) {
      try {
        const res = await fetch(`${API_BASE}/orders/my`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        if (!res.ok) {
          updateOrderStats([]);
          return;
        }

        const rawOrders = await res.json();
        profileOrders = rawOrders.map((order) => ({
          id: order.id || '',
          status: String(order.status || 'PENDING').toLowerCase(),
        }));

        updateOrderStats(profileOrders);
      } catch (error) {
        console.error('Profile orders error:', error);
        updateOrderStats([]);
      }
    }

    function updateOrderStats(orders = profileOrders) {
      const countBy = (statuses) => orders.filter((order) => statuses.includes(order.status)).length;
      document.getElementById('stat-delivered').textContent = String(countBy(['delivered']));
      document.getElementById('stat-shipped').textContent = String(countBy(['shipped']));
      document.getElementById('stat-processing').textContent = String(countBy(['processing', 'paid']));
      document.getElementById('stat-pending').textContent = String(countBy(['pending']));
    }

    function formatBirthday(value) {
      if (!value) return '-';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function renderProfileAvatar(user) {
      const avatarEl = document.getElementById('profile-avatar');
      if (!avatarEl) return;

      if (user?.avatar) {
        avatarEl.innerHTML = `<img src="${escapeHtml(user.avatar)}" alt="${escapeHtml(user.name || 'ผู้ใช้')}" class="w-full h-full object-cover rounded-full">`;
        return;
      }

      const initial = (user?.name || user?.email || 'U').trim().charAt(0).toUpperCase();
      avatarEl.innerHTML = `<span class="text-3xl font-semibold text-gray-500">${escapeHtml(initial)}</span>`;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.appendChild(document.createTextNode(String(str ?? '')));
      return div.innerHTML;
    }
  </script>
