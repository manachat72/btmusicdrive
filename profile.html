<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ข้อมูลส่วนตัว — btmusicdrive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { primary: '#C8A84E', secondary: '#1a1a1a' } } } };</script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script async defer crossorigin="anonymous" src="https://connect.facebook.net/th_TH/sdk.js"></script>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased">
  <header id="site-header"></header>

  <main class="pt-20 pb-16">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <div class="flex flex-col lg:flex-row gap-8">

        <!-- Account Sidebar -->
        <aside class="lg:w-64 flex-shrink-0">
          <div class="bg-white rounded-2xl border border-gray-100 p-4 mb-4">
            <div class="flex items-center gap-3 mb-4" id="profile-sidebar-user">
              <div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center"><i class="ph ph-user text-2xl text-primary"></i></div>
              <div>
                <p class="font-semibold text-gray-900" id="sidebar-user-name">ผู้ใช้</p>
                <p class="text-xs text-gray-500" id="sidebar-user-email">กรุณาเข้าสู่ระบบ</p>
              </div>
            </div>
          </div>
          <div class="mb-6">
            <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">รายการ</h3>
            <ul class="space-y-1">
              <li><a href="orders.html" class="flex items-center gap-2 px-3 py-2 rounded-lg text-gray-700 hover:bg-gray-100 transition-colors"><i class="ph ph-package text-lg"></i> คำสั่งซื้อ</a></li>
              <li><a href="wishlist.html" class="flex items-center gap-2 px-3 py-2 rounded-lg text-gray-700 hover:bg-gray-100 transition-colors"><i class="ph ph-heart text-lg"></i> สินค้าที่ถูกใจ</a></li>
            </ul>
          </div>
          <div>
            <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">บัญชี</h3>
            <ul class="space-y-1">
              <li><a href="profile.html" class="flex items-center gap-2 px-3 py-2 rounded-lg text-primary font-semibold bg-amber-50 border-l-4 border-primary transition-colors"><i class="ph ph-user-circle text-lg"></i> ข้อมูลส่วนตัว</a></li>
              <li><a href="address.html" class="flex items-center gap-2 px-3 py-2 rounded-lg text-gray-700 hover:bg-gray-100 transition-colors"><i class="ph ph-map-pin text-lg"></i> ที่อยู่สำหรับจัดส่ง</a></li>
              <li><a href="#" onclick="localStorage.removeItem('token');localStorage.removeItem('user');location.href='index.html';" class="flex items-center gap-2 px-3 py-2 rounded-lg text-red-500 hover:bg-red-50 transition-colors"><i class="ph ph-sign-out text-lg"></i> ออกจากระบบ</a></li>
            </ul>
          </div>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 min-w-0">
          <div class="bg-white rounded-2xl border border-gray-100 p-6 sm:p-10">
            <div class="flex items-center gap-3 mb-8 pb-6 border-b border-gray-100">
              <div class="bg-amber-50 w-10 h-10 rounded-full flex items-center justify-center"><i class="ph ph-user-circle text-xl text-primary"></i></div>
              <h1 class="text-2xl font-bold text-gray-900">ข้อมูลส่วนตัว</h1>
            </div>

            <!-- Profile Form -->
            <form id="profileForm" class="space-y-6" onsubmit="return saveProfile(event)">
              <div class="flex flex-col items-center gap-4 mb-6">
                <div class="w-24 h-24 rounded-full bg-gray-100 flex items-center justify-center overflow-hidden" id="profile-avatar">
                  <i class="ph ph-user text-4xl text-gray-400"></i>
                </div>
                <button type="button" class="text-sm text-primary hover:underline">เปลี่ยนรูปโปรไฟล์</button>
              </div>

              <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อ</label>
                  <input id="pf-fname" type="text" class="w-full border border-gray-200 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary/30 focus:border-primary outline-none transition" placeholder="ชื่อ">
                </div>
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1">นามสกุล</label>
                  <input id="pf-lname" type="text" class="w-full border border-gray-200 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary/30 focus:border-primary outline-none transition" placeholder="นามสกุล">
                </div>
              </div>

              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">อีเมล</label>
                <input id="pf-email" type="email" class="w-full border border-gray-200 rounded-lg px-4 py-2.5 bg-gray-50 text-gray-500 cursor-not-allowed" readonly>
              </div>

              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">เบอร์โทรศัพท์</label>
                <input id="pf-phone" type="tel" class="w-full border border-gray-200 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary/30 focus:border-primary outline-none transition" placeholder="08x-xxx-xxxx">
              </div>

              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">วันเกิด</label>
                <input id="pf-birthday" type="date" class="w-full border border-gray-200 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary/30 focus:border-primary outline-none transition">
              </div>

              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">เพศ</label>
                <div class="flex gap-4">
                  <label class="flex items-center gap-2"><input type="radio" name="gender" value="male" class="text-primary"> ชาย</label>
                  <label class="flex items-center gap-2"><input type="radio" name="gender" value="female" class="text-primary"> หญิง</label>
                  <label class="flex items-center gap-2"><input type="radio" name="gender" value="other" class="text-primary"> ไม่ระบุ</label>
                </div>
              </div>

              <div class="pt-4 border-t">
                <button type="submit" class="bg-primary hover:bg-yellow-600 text-white font-semibold px-8 py-3 rounded-lg transition-colors">บันทึกข้อมูล</button>
              </div>
            </form>
          </div>

          <!-- Change Password -->
          <div class="bg-white rounded-2xl border border-gray-100 p-6 sm:p-10 mt-6">
            <h2 class="text-lg font-bold text-gray-900 mb-4">เปลี่ยนรหัสผ่าน</h2>
            <form id="passwordForm" class="space-y-4" onsubmit="return changePassword(event)">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">รหัสผ่านปัจจุบัน</label>
                <input id="pw-current" type="password" class="w-full border border-gray-200 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary/30 focus:border-primary outline-none transition" required>
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">รหัสผ่านใหม่</label>
                <input id="pw-new" type="password" minlength="6" class="w-full border border-gray-200 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary/30 focus:border-primary outline-none transition" required>
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">ยืนยันรหัสผ่านใหม่</label>
                <input id="pw-confirm" type="password" minlength="6" class="w-full border border-gray-200 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary/30 focus:border-primary outline-none transition" required>
              </div>
              <button type="submit" class="bg-secondary hover:bg-gray-700 text-white font-semibold px-8 py-3 rounded-lg transition-colors">เปลี่ยนรหัสผ่าน</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>
  <script src="components.js"></script>
  <script>
    (function(){
      const user = JSON.parse(localStorage.getItem('user') || 'null');
      if(!user){ location.href='index.html'; return; }
      document.getElementById('sidebar-user-name').textContent = (user.firstName||'') + ' ' + (user.lastName||'');
      document.getElementById('sidebar-user-email').textContent = user.email||'';
      document.getElementById('pf-fname').value = user.firstName||'';
      document.getElementById('pf-lname').value = user.lastName||'';
      document.getElementById('pf-email').value = user.email||'';
      document.getElementById('pf-phone').value = user.phone||'';
      document.getElementById('pf-birthday').value = user.birthday||'';
      if(user.gender) document.querySelector(`input[name="gender"][value="${user.gender}"]`).checked = true;
    })();

    function saveProfile(e){
      e.preventDefault();
      const user = JSON.parse(localStorage.getItem('user') || '{}');
      user.firstName = document.getElementById('pf-fname').value;
      user.lastName = document.getElementById('pf-lname').value;
      user.phone = document.getElementById('pf-phone').value;
      user.birthday = document.getElementById('pf-birthday').value;
      const g = document.querySelector('input[name="gender"]:checked');
      if(g) user.gender = g.value;
      localStorage.setItem('user', JSON.stringify(user));
      document.getElementById('sidebar-user-name').textContent = (user.firstName||'') + ' ' + (user.lastName||'');
      alert('บันทึกข้อมูลเรียบร้อย');
      return false;
    }

    function changePassword(e){
      e.preventDefault();
      const pw = document.getElementById('pw-new').value;
      const confirm = document.getElementById('pw-confirm').value;
      if(pw !== confirm){ alert('รหัสผ่านไม่ตรงกัน'); return false; }
      alert('เปลี่ยนรหัสผ่านเรียบร้อย');
      document.getElementById('passwordForm').reset();
      return false;
    }
  </script>
</body>
</html>
