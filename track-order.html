<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#8B7355">
  <link rel="icon" type="image/png" href="images/logo (60 x 60 px) (1).png">
  <title>ติดตามพัสดุ — Bt music drive</title>
  <meta name="description" content="ติดตามสถานะการจัดส่งสินค้า btmusicdrive ได้แบบเรียลไทม์">
  <meta name="keywords" content="ติดตามพัสดุ, ตรวจสอบการจัดส่ง, btmusicdrive, แฟลชไดร์ฟเพลง">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://btmusicdrive.com/track-order.html">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#8B7355',
            secondary: '#0F172A',
          },
          animation: {
            'fade-up': 'fadeUp 0.5s ease forwards',
            'shimmer': 'shimmer 1.5s infinite',
          },
          keyframes: {
            fadeUp: { '0%': { opacity: 0, transform: 'translateY(16px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
            shimmer: { '0%': { backgroundPosition: '-200% 0' }, '100%': { backgroundPosition: '200% 0' } },
          }
        }
      }
    };
  </script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="style.css">
  <style>
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    .step-line { width: 2px; flex-shrink: 0; }
    .skeleton { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    .glass-card { background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    .hero-glow { background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(139,115,85,0.18) 0%, transparent 70%); }
    .search-tab.active { background: #8B7355; color: #fff; box-shadow: 0 2px 8px rgba(139,115,85,0.3); }
    .search-tab { transition: all 0.2s; }
    .pulse-dot { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 antialiased">

<div id="site-header"></div>

<!-- ── Hero + Search ──────────────────────────────────────────────────────── -->
<div class="bg-secondary pt-32 pb-20 px-4">
  <div class="max-w-2xl mx-auto text-center">
    <h1 class="text-2xl sm:text-3xl font-bold text-white mb-2">เช็คสถานะการจัดส่ง</h1>
    <p class="text-gray-400 text-sm mb-8">กรอกหมายเลขพัสดุ เพื่อดูสถานะการจัดส่งของคุณ</p>

    <!-- Search Box -->
    <div class="flex gap-0 rounded-xl overflow-hidden shadow-lg max-w-xl mx-auto">
      <input id="flash-tracking-input" type="text"
        placeholder="กรอกหมายเลขพัสดุ Flash Express"
        class="flex-1 px-5 py-4 text-sm text-gray-800 bg-white focus:outline-none font-mono"
        onkeydown="if(event.key==='Enter') goFlash()">
      <button onclick="goFlash()"
        class="px-6 py-4 text-white text-sm font-bold whitespace-nowrap transition-opacity hover:opacity-90"
        style="background:#ff6600;">
        ค้นหา
      </button>
    </div>
    <p class="text-gray-500 text-xs mt-3">เฉพาะออเดอร์ที่ส่งสินค้ากับ Flash Express</p>
  </div>
</div>

<script>
  function goFlash() {
    const num = document.getElementById('flash-tracking-input').value.trim();
    const url = 'https://www.flashexpress.co.th/fle/tracking' + (num ? '?se=' + encodeURIComponent(num) : '');
    window.open(url, '_blank', 'noopener');
  }
</script>


<div id="site-footer"></div>
<script src="components.js"></script>
<script src="script.js"></script>
</body>
</html>
