  <script src="components.min.js?v=c18393c2"></script>
  <script>
    const API_BASE = (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost') ? 'http://localhost:5000/api' : '/api';

    document.addEventListener('DOMContentLoaded', async () => {
      const token = localStorage.getItem('btmusicdrive_token');
      if (!token) { location.href = '/'; return; }
      
      try {
        const res = await fetch(`${API_BASE}/auth/me`, { headers: { Authorization: `Bearer ${token}` } });
        if (res.ok) {
          const data = await res.json();
          document.getElementById('sidebar-user-name').textContent = data.user.name || 'ผู้ใช้';
          document.getElementById('sidebar-user-email').textContent = data.user.email || '';
          renderAddresses();
        } else {
          location.href = '/';
        }
      } catch(e) { console.error(e); }
    });

    function getAddresses(){ return JSON.parse(localStorage.getItem('btmusicdrive_addresses') || '[]'); }
    function saveAddresses(list){ localStorage.setItem('btmusicdrive_addresses', JSON.stringify(list)); }

    function renderAddresses(){
      const list = getAddresses();
      const container = document.getElementById('address-list');
      const empty = document.getElementById('address-empty');
      if(!list.length){ container.innerHTML=''; empty.classList.remove('hidden'); return; }
      empty.classList.add('hidden');

      container.innerHTML = list.map((a, i) => `
        <div class="border ${a.isDefault ? 'border-primary bg-amber-50/30' : 'border-gray-100'} rounded-xl p-4 relative">
          ${a.isDefault ? '<span class="absolute top-3 right-3 bg-primary text-white text-xs font-bold px-2 py-0.5 rounded-full">ที่อยู่หลัก</span>' : ''}
          <p class="font-semibold text-gray-900">${a.firstName} ${a.lastName}</p>
          <p class="text-sm text-gray-500 mt-1">${a.phone}</p>
          <p class="text-sm text-gray-600 mt-2">${a.address} ${a.subdistrict} ${a.district} ${a.province} ${a.zip}</p>
          <div class="flex gap-3 mt-3 pt-3 border-t border-gray-100">
            <button onclick="editAddress(${i})" class="text-sm text-primary hover:underline"><i class="ph ph-pencil-simple mr-1"></i>แก้ไข</button>
            <button onclick="deleteAddress(${i})" class="text-sm text-red-500 hover:underline"><i class="ph ph-trash mr-1"></i>ลบ</button>
            ${!a.isDefault ? `<button onclick="setDefault(${i})" class="text-sm text-gray-500 hover:underline"><i class="ph ph-star mr-1"></i>ตั้งเป็นหลัก</button>` : ''}
          </div>
        </div>
      `).join('');
    }

    function openAddressModal(data){
      document.getElementById('addr-modal-title').textContent = data ? 'แก้ไขที่อยู่' : 'เพิ่มที่อยู่ใหม่';
      document.getElementById('addr-id').value = data ? data._idx : '';
      document.getElementById('addr-fname').value = data?.firstName || '';
      document.getElementById('addr-lname').value = data?.lastName || '';
      document.getElementById('addr-phone').value = data?.phone || '';
      document.getElementById('addr-address').value = data?.address || '';
      document.getElementById('addr-subdistrict').value = data?.subdistrict || '';
      document.getElementById('addr-district').value = data?.district || '';
      document.getElementById('addr-province').value = data?.province || '';
      document.getElementById('addr-zip').value = data?.zip || '';
      document.getElementById('addr-default').checked = data?.isDefault || false;
      document.getElementById('addressModal').classList.remove('hidden');
    }
    function closeAddressModal(){
      document.getElementById('addressModal').classList.add('hidden');
      document.getElementById('addressForm').reset();
    }

    function saveAddress(e){
      e.preventDefault();
      const list = getAddresses();
      const idx = document.getElementById('addr-id').value;
      const isDefault = document.getElementById('addr-default').checked;
      const obj = {
        firstName: document.getElementById('addr-fname').value,
        lastName: document.getElementById('addr-lname').value,
        phone: document.getElementById('addr-phone').value,
        address: document.getElementById('addr-address').value,
        subdistrict: document.getElementById('addr-subdistrict').value,
        district: document.getElementById('addr-district').value,
        province: document.getElementById('addr-province').value,
        zip: document.getElementById('addr-zip').value,
        isDefault: isDefault
      };
      if(isDefault) list.forEach(a => a.isDefault = false);
      if(idx !== ''){ list[parseInt(idx)] = obj; }
      else { list.push(obj); }
      saveAddresses(list);
      closeAddressModal();
      renderAddresses();
      return false;
    }

    function editAddress(i){
      const list = getAddresses();
      openAddressModal({...list[i], _idx: i});
    }

    function deleteAddress(i){
      if(!confirm('ลบที่อยู่นี้?')) return;
      const list = getAddresses();
      list.splice(i, 1);
      saveAddresses(list);
      renderAddresses();
    }

    function setDefault(i){
      const list = getAddresses();
      list.forEach(a => a.isDefault = false);
      list[i].isDefault = true;
      saveAddresses(list);
      renderAddresses();
    }
  </script>
