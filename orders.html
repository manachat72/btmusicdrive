  <script>
    const API_BASE = (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost') ? 'http://localhost:5000/api' : '/api';

    document.addEventListener('DOMContentLoaded', async () => {
      const token = localStorage.getItem('btmusicdrive_token');
      if (!token) { location.href = '/'; return; }
      
      try {
        const res = await fetch(`${API_BASE}/auth/me`, { headers: { Authorization: `Bearer ${token}` } });
        if (res.ok) {
          const data = await res.json();
          document.getElementById('sidebar-user-name').textContent = data.user.name || 'ผู้ใช้';
          document.getElementById('sidebar-user-email').textContent = data.user.email || '';
          
          // Fetch orders from API
          let orders = [];
          try {
            const ordersRes = await fetch(`${API_BASE}/orders/my`, { headers: { Authorization: `Bearer ${token}` } });
            if (ordersRes.ok) {
              const rawOrders = await ordersRes.json();
              orders = rawOrders.map(o => ({
                id: o.id ? o.id.slice(-8).toUpperCase() : '—',
                status: (o.status || 'pending').toLowerCase(),
                date: o.createdAt ? new Date(o.createdAt).toLocaleDateString('th-TH', { year:'numeric', month:'short', day:'numeric' }) : '',
                total: Number(o.totalAmount) || 0,
                trackingNumber: o.trackingNumber || '',
                carrier: o.carrier || '',
                items: (o.items || []).map(i => ({
                  name: i.product?.name || 'สินค้า',
                  qty: i.quantity || 1,
                  price: Number(i.priceAtTime) || 0
                }))
              }));
            }
          } catch(e) { console.warn('Could not fetch orders from API, falling back to localStorage:', e); }

          // Fallback to localStorage if API returned empty
          if (!orders.length) {
            orders = JSON.parse(localStorage.getItem('btmusicdrive_orders') || '[]');
          }
          
          renderOrders(orders, 'all');

          document.querySelectorAll('.order-tab').forEach(btn => {
            btn.addEventListener('click', function(){
              document.querySelectorAll('.order-tab').forEach(b => { b.classList.remove('bg-primary','text-white','active'); b.classList.add('bg-gray-100','text-gray-600'); });
              this.classList.remove('bg-gray-100','text-gray-600'); this.classList.add('bg-primary','text-white','active');
              renderOrders(orders, this.dataset.filter);
            });
          });
        } else {
          location.href = '/';
        }
      } catch(e) { console.error(e); }
    });

    function renderOrders(orders, filter){
      const list = document.getElementById('orders-list');
      const empty = document.getElementById('orders-empty');
      const filtered = filter==='all' ? orders : orders.filter(o => o.status === filter);
      if(!filtered.length){ list.innerHTML=''; empty.classList.remove('hidden'); return; }
      empty.classList.add('hidden');

      const statusMap = { pending: {label:'รอชำระเงิน', color:'yellow'}, processing: {label:'กำลังจัดส่ง', color:'blue'}, paid: {label:'ชำระเงินแล้ว', color:'green'}, shipped: {label:'จัดส่งแล้ว', color:'orange'}, delivered: {label:'สำเร็จ', color:'green'}, cancelled: {label:'ยกเลิก', color:'red'} };
      const CARRIER_URLS = { Flash: 'https://www.flashexpress.co.th/fle/tracking?se=', Kerry: 'https://th.kerryexpress.com/en/track/?track=', JT: 'https://www.jtexpress.co.th/index/query/gzquery.html?bills=' };

      list.innerHTML = filtered.map(o => {
        const s = statusMap[o.status] || {label:o.status, color:'gray'};
        const items = (o.items||[]).map(i => `
          <div class="flex items-center gap-3">
            <div class="w-14 h-14 bg-gray-100 rounded-lg flex items-center justify-center flex-shrink-0"><i class="ph ph-music-note text-xl text-gray-400"></i></div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium text-gray-900 truncate">${i.name||'สินค้า'}</p>
              <p class="text-xs text-gray-500">x${i.qty||1}</p>
            </div>
            <p class="text-sm font-bold">฿${(i.price||0).toLocaleString()}</p>
          </div>
        `).join('');
        return `
          <div class="border border-gray-100 rounded-xl p-4 mb-4">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-2 mb-4 pb-3 border-b border-gray-100">
              <div>
                <span class="text-sm font-semibold text-gray-900">คำสั่งซื้อ #${o.id||'—'}</span>
                <span class="text-xs text-gray-400 ml-2">${o.date||''}</span>
              </div>
              <span class="inline-block px-3 py-1 rounded-full text-xs font-bold bg-${s.color}-100 text-${s.color}-700">${s.label}</span>
            </div>
            <div class="space-y-3">${items}</div>
            <div class="flex justify-between items-center mt-4 pt-3 border-t border-gray-100">
              <span class="text-sm text-gray-500">ยอดรวม</span>
              <span class="font-bold text-lg">฿${(o.total||0).toLocaleString()}</span>
            </div>
            ${o.trackingNumber ? `
            <div class="mt-3 pt-3 border-t border-gray-100 flex flex-col sm:flex-row sm:items-center gap-2">
              <div class="flex items-center gap-2 flex-1 min-w-0">
                <i class="ph ph-truck text-orange-500 text-base flex-shrink-0"></i>
                <span class="text-xs text-gray-500">${o.carrier || 'ขนส่ง'}</span>
                <span class="text-xs font-mono font-bold text-gray-700 truncate">${o.trackingNumber}</span>
              </div>
              <a href="${(CARRIER_URLS[o.carrier] || 'https://www.flashexpress.co.th/fle/tracking?se=') + encodeURIComponent(o.trackingNumber)}"
                target="_blank" rel="noopener"
                class="flex-shrink-0 inline-flex items-center gap-1.5 px-4 py-2 rounded-xl text-xs font-bold text-white transition-all hover:opacity-90 active:scale-95"
                style="background:#ff6600;">
                <i class="ph ph-map-pin-line"></i> ติดตามพัสดุ
              </a>
            </div>` : ''}
          </div>
        `;
      }).join('');
    }
  </script>
