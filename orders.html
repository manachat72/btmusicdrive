<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>คำสั่งซื้อ — btmusicdrive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { primary: '#C8A84E', secondary: '#1a1a1a' } } } };</script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script async defer crossorigin="anonymous" src="https://connect.facebook.net/th_TH/sdk.js"></script>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased">
  <header id="site-header"></header>

  <main class="pt-20 pb-20 md:pb-16">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <div class="flex flex-col lg:flex-row gap-8">

        <!-- Account Sidebar (desktop only, mobile uses bottom nav drawer) -->
        <aside class="hidden lg:block lg:w-64 flex-shrink-0">
          <div class="bg-white rounded-2xl border border-gray-100 p-4 mb-4">
            <div class="flex items-center gap-3 mb-4" id="profile-sidebar-user">
              <div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center"><i class="ph ph-user text-2xl text-primary"></i></div>
              <div>
                <p class="font-semibold text-gray-900" id="sidebar-user-name">ผู้ใช้</p>
                <p class="text-xs text-gray-500" id="sidebar-user-email">กรุณาเข้าสู่ระบบ</p>
              </div>
            </div>
          </div>
          <div class="mb-6">
            <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">รายการ</h3>
            <ul class="space-y-1">
              <li><a href="orders.html" class="flex items-center gap-2 px-3 py-2 rounded-lg text-primary font-semibold bg-amber-50 border-l-4 border-primary transition-colors"><i class="ph ph-package text-lg"></i> คำสั่งซื้อ</a></li>
              <li><a href="wishlist.html" class="flex items-center gap-2 px-3 py-2 rounded-lg text-gray-700 hover:bg-gray-100 transition-colors"><i class="ph ph-heart text-lg"></i> สินค้าที่ถูกใจ</a></li>
            </ul>
          </div>
          <div>
            <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">บัญชี</h3>
            <ul class="space-y-1">
              <li><a href="profile.html" class="flex items-center gap-2 px-3 py-2 rounded-lg text-gray-700 hover:bg-gray-100 transition-colors"><i class="ph ph-user-circle text-lg"></i> ข้อมูลส่วนตัว</a></li>
              <li><a href="address.html" class="flex items-center gap-2 px-3 py-2 rounded-lg text-gray-700 hover:bg-gray-100 transition-colors"><i class="ph ph-map-pin text-lg"></i> ที่อยู่สำหรับจัดส่ง</a></li>
              <li><a href="#" onclick="localStorage.removeItem('token');localStorage.removeItem('user');location.href='index.html';" class="flex items-center gap-2 px-3 py-2 rounded-lg text-red-500 hover:bg-red-50 transition-colors"><i class="ph ph-sign-out text-lg"></i> ออกจากระบบ</a></li>
            </ul>
          </div>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 min-w-0">
          <div class="bg-white rounded-2xl border border-gray-100 p-6 sm:p-10">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6 pb-6 border-b border-gray-100">
              <div class="flex items-center gap-3">
                <div class="bg-blue-50 w-10 h-10 rounded-full flex items-center justify-center"><i class="ph ph-package text-xl text-blue-600"></i></div>
                <h1 class="text-2xl font-bold text-gray-900">คำสั่งซื้อ</h1>
              </div>
              <a href="track-order.html" class="text-sm text-primary hover:underline flex items-center gap-1"><i class="ph ph-magnifying-glass"></i> ติดตามพัสดุ</a>
            </div>

            <!-- Filter Tabs -->
            <div class="flex gap-2 overflow-x-auto pb-4 mb-6 border-b border-gray-100" id="order-tabs">
              <button class="order-tab active px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap bg-primary text-white" data-filter="all">ทั้งหมด</button>
              <button class="order-tab px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap bg-gray-100 text-gray-600 hover:bg-gray-200" data-filter="pending">รอชำระเงิน</button>
              <button class="order-tab px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap bg-gray-100 text-gray-600 hover:bg-gray-200" data-filter="processing">กำลังจัดส่ง</button>
              <button class="order-tab px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap bg-gray-100 text-gray-600 hover:bg-gray-200" data-filter="delivered">สำเร็จ</button>
              <button class="order-tab px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap bg-gray-100 text-gray-600 hover:bg-gray-200" data-filter="cancelled">ยกเลิก</button>
            </div>

            <!-- Order List -->
            <div id="orders-list">
              <!-- Will be populated by JS -->
            </div>

            <!-- Empty State -->
            <div id="orders-empty" class="hidden text-center py-16">
              <i class="ph ph-shopping-bag text-6xl text-gray-300 mb-4"></i>
              <p class="text-lg font-semibold text-gray-400 mb-2">ยังไม่มีคำสั่งซื้อ</p>
              <p class="text-sm text-gray-400 mb-6">เริ่มช้อปปิ้งสินค้าที่คุณชอบได้เลย</p>
              <a href="index.html" class="inline-block bg-primary hover:bg-yellow-600 text-white font-semibold px-6 py-3 rounded-lg transition-colors">เลือกซื้อสินค้า</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>
  <script src="components.js"></script>
  <script>
    (function(){
      const user = JSON.parse(localStorage.getItem('user') || 'null');
      if(!user){ location.href='index.html'; return; }
      document.getElementById('sidebar-user-name').textContent = (user.firstName||'') + ' ' + (user.lastName||'');
      document.getElementById('sidebar-user-email').textContent = user.email||'';

      const orders = JSON.parse(localStorage.getItem('btmusicdrive_orders') || '[]');
      renderOrders(orders, 'all');

      document.querySelectorAll('.order-tab').forEach(btn => {
        btn.addEventListener('click', function(){
          document.querySelectorAll('.order-tab').forEach(b => { b.classList.remove('bg-primary','text-white','active'); b.classList.add('bg-gray-100','text-gray-600'); });
          this.classList.remove('bg-gray-100','text-gray-600'); this.classList.add('bg-primary','text-white','active');
          renderOrders(orders, this.dataset.filter);
        });
      });
    })();

    function renderOrders(orders, filter){
      const list = document.getElementById('orders-list');
      const empty = document.getElementById('orders-empty');
      const filtered = filter==='all' ? orders : orders.filter(o => o.status === filter);
      if(!filtered.length){ list.innerHTML=''; empty.classList.remove('hidden'); return; }
      empty.classList.add('hidden');

      const statusMap = { pending: {label:'รอชำระเงิน', color:'yellow'}, processing: {label:'กำลังจัดส่ง', color:'blue'}, delivered: {label:'สำเร็จ', color:'green'}, cancelled: {label:'ยกเลิก', color:'red'} };

      list.innerHTML = filtered.map(o => {
        const s = statusMap[o.status] || {label:o.status, color:'gray'};
        const items = (o.items||[]).map(i => `
          <div class="flex items-center gap-3">
            <div class="w-14 h-14 bg-gray-100 rounded-lg flex items-center justify-center flex-shrink-0"><i class="ph ph-music-note text-xl text-gray-400"></i></div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium text-gray-900 truncate">${i.name||'สินค้า'}</p>
              <p class="text-xs text-gray-500">x${i.qty||1}</p>
            </div>
            <p class="text-sm font-bold">฿${(i.price||0).toLocaleString()}</p>
          </div>
        `).join('');
        return `
          <div class="border border-gray-100 rounded-xl p-4 mb-4">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-2 mb-4 pb-3 border-b border-gray-100">
              <div>
                <span class="text-sm font-semibold text-gray-900">คำสั่งซื้อ #${o.id||'—'}</span>
                <span class="text-xs text-gray-400 ml-2">${o.date||''}</span>
              </div>
              <span class="inline-block px-3 py-1 rounded-full text-xs font-bold bg-${s.color}-100 text-${s.color}-700">${s.label}</span>
            </div>
            <div class="space-y-3">${items}</div>
            <div class="flex justify-between items-center mt-4 pt-3 border-t border-gray-100">
              <span class="text-sm text-gray-500">ยอดรวม</span>
              <span class="font-bold text-lg">฿${(o.total||0).toLocaleString()}</span>
            </div>
          </div>
        `;
      }).join('');
    }
  </script>
</body>
</html>
