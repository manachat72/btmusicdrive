<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สินค้าที่ถูกใจ — btmusicdrive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { primary: '#C8A84E', secondary: '#1a1a1a' } } } };</script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script async defer crossorigin="anonymous" src="https://connect.facebook.net/th_TH/sdk.js"></script>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased">
  <header id="site-header"></header>

  <main class="pt-20 pb-20 md:pb-16">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <div class="flex flex-col lg:flex-row gap-8">

        <!-- Account Sidebar (desktop only, mobile uses bottom nav drawer) -->
        <aside class="hidden lg:block lg:w-64 flex-shrink-0">
          <div class="bg-white rounded-2xl border border-gray-100 p-4 mb-4">
            <div class="flex items-center gap-3 mb-4">
              <div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center"><i class="ph ph-user text-2xl text-primary"></i></div>
              <div>
                <p class="font-semibold text-gray-900" id="sidebar-user-name">ผู้ใช้</p>
                <p class="text-xs text-gray-500" id="sidebar-user-email">กรุณาเข้าสู่ระบบ</p>
              </div>
            </div>
          </div>
          <div class="mb-6">
            <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">รายการ</h3>
            <ul class="space-y-1">
              <li><a href="orders.html" class="flex items-center gap-2 px-3 py-2 rounded-lg text-gray-700 hover:bg-gray-100 transition-colors"><i class="ph ph-package text-lg"></i> คำสั่งซื้อ</a></li>
              <li><a href="wishlist.html" class="flex items-center gap-2 px-3 py-2 rounded-lg text-primary font-semibold bg-amber-50 border-l-4 border-primary transition-colors"><i class="ph ph-heart text-lg"></i> สินค้าที่ถูกใจ</a></li>
            </ul>
          </div>
          <div>
            <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">บัญชี</h3>
            <ul class="space-y-1">
              <li><a href="profile.html" class="flex items-center gap-2 px-3 py-2 rounded-lg text-gray-700 hover:bg-gray-100 transition-colors"><i class="ph ph-user-circle text-lg"></i> ข้อมูลส่วนตัว</a></li>
              <li><a href="address.html" class="flex items-center gap-2 px-3 py-2 rounded-lg text-gray-700 hover:bg-gray-100 transition-colors"><i class="ph ph-map-pin text-lg"></i> ที่อยู่สำหรับจัดส่ง</a></li>
              <li><a href="#" onclick="localStorage.removeItem('token');localStorage.removeItem('user');location.href='index.html';" class="flex items-center gap-2 px-3 py-2 rounded-lg text-red-500 hover:bg-red-50 transition-colors"><i class="ph ph-sign-out text-lg"></i> ออกจากระบบ</a></li>
            </ul>
          </div>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 min-w-0">
          <div class="bg-white rounded-2xl border border-gray-100 p-6 sm:p-10">
            <div class="flex items-center gap-3 mb-8 pb-6 border-b border-gray-100">
              <div class="bg-red-50 w-10 h-10 rounded-full flex items-center justify-center"><i class="ph ph-heart text-xl text-red-500"></i></div>
              <h1 class="text-2xl font-bold text-gray-900">สินค้าที่ถูกใจ</h1>
              <span class="text-sm text-gray-400 ml-auto" id="wishlist-count">0 รายการ</span>
            </div>

            <!-- Wishlist Grid -->
            <div id="wishlist-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
              <!-- Populated by JS -->
            </div>

            <!-- Empty State -->
            <div id="wishlist-empty" class="hidden text-center py-16">
              <i class="ph ph-heart text-6xl text-gray-300 mb-4"></i>
              <p class="text-lg font-semibold text-gray-400 mb-2">ยังไม่มีสินค้าที่ถูกใจ</p>
              <p class="text-sm text-gray-400 mb-6">กดปุ่ม <i class="ph ph-heart"></i> บนสินค้าเพื่อเพิ่มเข้ารายการ</p>
              <a href="index.html" class="inline-block bg-primary hover:bg-yellow-600 text-white font-semibold px-6 py-3 rounded-lg transition-colors">เลือกซื้อสินค้า</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>
  <script src="components.js"></script>
  <script>
    (function(){
      const user = JSON.parse(localStorage.getItem('user') || 'null');
      if(!user){ location.href='index.html'; return; }
      document.getElementById('sidebar-user-name').textContent = (user.firstName||'') + ' ' + (user.lastName||'');
      document.getElementById('sidebar-user-email').textContent = user.email||'';

      renderWishlist();
    })();

    function getWishlist(){
      return JSON.parse(localStorage.getItem('btmusicdrive_wishlist') || '[]');
    }
    function saveWishlist(list){
      localStorage.setItem('btmusicdrive_wishlist', JSON.stringify(list));
    }

    function renderWishlist(){
      const list = getWishlist();
      const grid = document.getElementById('wishlist-grid');
      const empty = document.getElementById('wishlist-empty');
      document.getElementById('wishlist-count').textContent = list.length + ' รายการ';

      if(!list.length){ grid.innerHTML=''; empty.classList.remove('hidden'); return; }
      empty.classList.add('hidden');

      grid.innerHTML = list.map((item, idx) => `
        <div class="border border-gray-100 rounded-xl overflow-hidden group">
          <div class="relative aspect-square bg-gray-100 flex items-center justify-center">
            ${item.image ? `<img src="${item.image}" alt="${item.name}" class="w-full h-full object-cover">` : '<i class="ph ph-music-note text-4xl text-gray-300"></i>'}
            <button onclick="removeWishlist(${idx})" class="absolute top-2 right-2 w-8 h-8 bg-white/90 rounded-full flex items-center justify-center shadow hover:bg-red-50 transition" title="ลบออก">
              <i class="ph-fill ph-heart text-red-500"></i>
            </button>
          </div>
          <div class="p-3">
            <p class="text-sm font-semibold text-gray-900 truncate">${item.name||'สินค้า'}</p>
            <p class="text-primary font-bold mt-1">฿${(item.price||0).toLocaleString()}</p>
            <button onclick="addToCart(${idx})" class="mt-2 w-full bg-primary hover:bg-yellow-600 text-white text-sm font-semibold py-2 rounded-lg transition-colors">
              <i class="ph ph-shopping-cart mr-1"></i> ใส่ตะกร้า
            </button>
          </div>
        </div>
      `).join('');
    }

    function removeWishlist(idx){
      const list = getWishlist();
      list.splice(idx, 1);
      saveWishlist(list);
      renderWishlist();
    }

    function addToCart(idx){
      const list = getWishlist();
      const item = list[idx];
      if(!item) return;
      const cart = JSON.parse(localStorage.getItem('btmusicdrive_cart') || '[]');
      const existing = cart.find(c => c.id === item.id);
      if(existing){ existing.qty = (existing.qty||1)+1; }
      else { cart.push({...item, qty:1}); }
      localStorage.setItem('btmusicdrive_cart', JSON.stringify(cart));
      alert('เพิ่มลงตะกร้าเรียบร้อย');
    }
  </script>
</body>
</html>
